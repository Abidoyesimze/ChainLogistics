name: CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smart-contract
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Ensure wasm32v1-none target is available
        run: rustup target add wasm32v1-none

      # Use the official Stellar CLI GitHub Action (v23.4.0)
      # Replaces the old manual soroban-cli curl install
      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v23.4.0

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          # Fixed: scoped to actual target dir relative to repo root,
          # not the working-directory (which would resolve incorrectly)
          path: smart-contract/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --release --all-features

      # Use stellar contract build instead of raw cargo build --target wasm32
      # This ensures proper metadata, optimizer flags, and correct wasm output paths
      - name: Build WASM contracts
        run: stellar contract build

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: smart-contract/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  frontend-tests:
    name: Frontend Tests & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Fixed: was running `npm run build` here (type check) AND again below (build verification)
      # Use tsc --noEmit for type checking, keep the real build separate
      - name: Type checking
        run: npx tsc --noEmit

      - name: Lint code
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifacts
          # Fixed: artifacts are uploaded from the job that produces them,
          # not from a downstream job that can't access other jobs' filesystems
          path: frontend/.next/
          retention-days: 7

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

  sdk-python:
    name: Python SDK Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: ./sdk/python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install SDK and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Python SDK tests with coverage gate
        run: pytest --cov=chainlogistics_sdk --cov-report=xml --cov-report=term-missing --cov-fail-under=90

      - name: Upload Python coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-coverage
          path: sdk/python/coverage.xml
          retention-days: 7

  sdk-rust:
    name: Rust SDK Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: ./sdk/rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust SDK tests
        run: cargo test --all-features

  sdk-java:
    name: Java SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk/java
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Java SDK tests
        run: mvn -B test

  sdk-dotnet:
    name: .NET SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk/dotnet/ChainLogistics.Sdk.Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run .NET SDK tests
        run: dotnet test

  sdk-benchmarks:
    name: SDK Benchmark Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk/python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run benchmark smoke test
        run: python ../benchmarks/benchmark_sdk.py

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [ rust-tests, frontend-tests, frontend-e2e, sdk-python, sdk-rust, sdk-java, sdk-dotnet, sdk-benchmarks ]
    steps:
      - name: All builds passed
        run: echo "All upstream jobs completed successfully"
